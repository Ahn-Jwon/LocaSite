<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocaSOS - Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <nav class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/LocaSite/" class="flex items-center gap-2 text-xl font-bold text-red-600">
                <i data-lucide="shield-alert"></i>
                <span>LocaSOS</span>
            </a>
            <div class="flex gap-6 text-sm font-medium">
                <a href="/LocaSite/" id="nav-home" class="hover:text-red-600 transition-colors">서비스 소개</a>
                <a href="/LocaSite/support.html" id="nav-support" class="hover:text-red-600 transition-colors font-bold text-red-600">지원</a>
                <a href="/LocaSite/privacy.html" id="nav-privacy" class="hover:text-red-600 transition-colors">개인정보처리방침</a>
            </div>
        </nav>
    </header>

    <main class="py-20 flex-grow flex items-center">
        <div class="container mx-auto px-4 max-w-2xl bg-white p-8 md:p-16 rounded-3xl shadow-sm border border-gray-100 text-center">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="mail" class="text-red-600 w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-black mb-6" id="support-title">고객 지원</h1>
            <p class="text-gray-600 text-lg mb-10 leading-relaxed" id="support-desc">
                서비스 이용 중 불편한 점이나 문의 사항이 있으시면 언제든지 아래 메일로 연락 부탁드립니다.
            </p>
            <a href="mailto:ajw0376@gmail.com" class="inline-flex items-center gap-3 bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-lg hover:shadow-red-200">
                <span>ajw0376@gmail.com</span>
                <i data-lucide="external-link" class="w-5 h-5"></i>
            </a>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-10">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400 text-xs font-medium" id="footer-copy">© 2026 LocaSOS. 모든 권리 보유.</p>
        </div>
    </footer>

    <script>
        const i18n = {
            ko: {
                nav_home: "서비스 소개", nav_support: "지원", nav_privacy: "개인정보처리방침",
                support_title: "고객 지원",
                support_desc: "서비스 이용 중 불편한 점이나 문의 사항이 있으시면 언제든지 아래 메일로 연락 부탁드립니다.",
                footer_copy: "© 2026 LocaSOS. 모든 권리 보유."
            },
            ja: {
                nav_home: "サービス紹介", nav_support: "サポート", nav_privacy: "プライバシーポリシー",
                support_title: "カスタマーサポート",
                support_desc: "サービスのご利用に関するご質問やご不明な点がございましたら、お気軽にメールにてお問い合わせください。",
                footer_copy: "© 2026 LocaSOS. All rights reserved."
            },
            en: {
                nav_home: "About", nav_support: "Support", nav_privacy: "Privacy Policy",
                support_title: "Support",
                support_desc: "If you have any questions or feedback while using the service, please feel free to contact us via email.",
                footer_copy: "© 2026 LocaSOS. All rights reserved."
            }
        };

        async function applyLanguage() {
            let lang = 'ko';
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.country_code === 'KR') lang = 'ko';
                else if (data.country_code === 'JP') lang = 'ja';
                else lang = 'en';
            } catch (e) {
                const browserLang = navigator.language.split('-')[0];
                if (['ko', 'ja', 'en'].includes(browserLang)) lang = browserLang;
            }

            const t = i18n[lang] || i18n.ko;
            const updateText = (id, text) => { const el = document.getElementById(id); if(el) el.textContent = text; };
            updateText('nav-home', t.nav_home);
            updateText('nav-support', t.nav_support);
            updateText('nav-privacy', t.nav_privacy);
            updateText('support-title', t.support_title);
            updateText('support-desc', t.support_desc);
            updateText('footer-copy', t.footer_copy);
            lucide.createIcons();
        }
        window.onload = applyLanguage;
    </script>
</body>
</html>
